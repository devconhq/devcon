syntax = "proto3";

package devcon;

// Message from agent to host identifying the container
message AgentHello {
  string container_name = 1;
  string workspace_name = 2;
}

// Message from agent to host to request port forwarding
message StartPortForward {
  uint32 port = 1;
}

// Message from agent to host to stop port forwarding
message StopPortForward {
  uint32 port = 1;
}

// Message from host to agent to open a URL in the browser
message OpenUrl {
  string url = 1;
}

// Message from host to agent requesting a new tunnel connection
message TunnelRequest {
  uint32 port = 1;
  uint32 tunnel_id = 2;
  uint32 data_port = 3;
}

// Message from container agent to host to open a unix socket relay session.
message StartSocketRelay {
  uint32 relay_id = 1;
  string socket_name = 2;
  string upstream_target = 3;
}

// Message carrying relay payload bytes for an active unix socket relay session.
message SocketRelayData {
  uint32 relay_id = 1;
  bytes payload = 2;
  bool eof = 3;
}

// Message indicating a relay session should be closed.
message StopSocketRelay {
  uint32 relay_id = 1;
  string error = 2;
}

// Request host-side snapshot of connected containers and forwarded ports.
message ListForwardsRequest {}

message PortMapping {
  uint32 container_port = 1;
  uint32 host_port = 2;
}

message ContainerPortMappings {
  string container_name = 1;
  string workspace_name = 2;
  repeated PortMapping mappings = 3;
}

message ListForwardsResponse {
  repeated ContainerPortMappings containers = 1;
}

message StartForwardRequest {
  string container_name = 1;
  uint32 port = 2;
}

message StartForwardResponse {
  string container_name = 1;
  uint32 port = 2;
  uint32 host_port = 3;
}

message EndForwardRequest {
  string container_name = 1;
  uint32 port = 2;
}

message EndForwardResponse {
  string container_name = 1;
  uint32 port = 2;
  uint32 host_port = 3;
}

message ControlError {
  string message = 1;
}

// Wrapper message for all agent communication
message AgentMessage {
  oneof message {
    StartPortForward start_port_forward = 1;
    StopPortForward stop_port_forward = 2;
    OpenUrl open_url = 3;
    TunnelRequest tunnel_request = 4;
    AgentHello agent_hello = 5;
    StartSocketRelay start_socket_relay = 6;
    SocketRelayData socket_relay_data = 7;
    StopSocketRelay stop_socket_relay = 8;
    ListForwardsRequest list_forwards_request = 9;
    ListForwardsResponse list_forwards_response = 10;
    StartForwardRequest start_forward_request = 11;
    StartForwardResponse start_forward_response = 12;
    EndForwardRequest end_forward_request = 13;
    EndForwardResponse end_forward_response = 14;
    ControlError control_error = 15;
  }
}
